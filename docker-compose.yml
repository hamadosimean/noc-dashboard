# version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - CACHE_TTL=${CACHE_TTL}
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - NOC_API_KEY=${NOC_API_KEY}
      - ITOP_URL=${ITOP_URL}
      - ITOP_USER=${ITOP_USER}
      - ITOP_PASS=${ITOP_PASS}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - NOTIFICATIONS_ENABLED=${NOTIFICATIONS_ENABLED:-false}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - NOC_SMS_RECIPIENTS=${NOC_SMS_RECIPIENTS:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noc@anptic.bf}
      - NOC_EMAIL_RECIPIENTS=${NOC_EMAIL_RECIPIENTS:-}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - SYNC_MV_REFRESH=${SYNC_MV_REFRESH:-true}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  etl-worker:
    build: ./etl
    command: celery -A celery_app worker --loglevel=${LOG_LEVEL:-INFO} --concurrency=2
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - NOC_API_URL=http://backend:8000
      - NOC_API_KEY=${NOC_API_KEY}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - CELERY_BROKER_DB=${CELERY_BROKER_DB:-1}
      - REPORTS_DIR=/reports
      # Supervision tool endpoints — a collector runs only when its URL is set
      - ZABBIX_API_URL=${ZABBIX_API_URL:-}
      - ZABBIX_USER=${ZABBIX_USER:-}
      - ZABBIX_PASSWORD=${ZABBIX_PASSWORD:-}
      - ZABBIX_API_TOKEN=${ZABBIX_API_TOKEN:-}
      - NAGIOS_API_URL=${NAGIOS_API_URL:-}
      - NAGIOS_USER=${NAGIOS_USER:-}
      - NAGIOS_PASSWORD=${NAGIOS_PASSWORD:-}
      - NAGIOS_API_KEY=${NAGIOS_API_KEY:-}
      - NETXMS_API_URL=${NETXMS_API_URL:-}
      - NETXMS_USER=${NETXMS_USER:-}
      - NETXMS_PASSWORD=${NETXMS_PASSWORD:-}
      - CENTREON_API_URL=${CENTREON_API_URL:-}
      - CENTREON_USER=${CENTREON_USER:-}
      - CENTREON_PASSWORD=${CENTREON_PASSWORD:-}
      - CENTREON_API_KEY=${CENTREON_API_KEY:-}
    volumes:
      - reports:/reports
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # CMD-SHELL so $HOSTNAME is expanded by the container shell
      test:
        ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3

  etl-beat:
    build: ./etl
    command: celery -A celery_app beat --loglevel=${LOG_LEVEL:-INFO}
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - CELERY_BROKER_DB=${CELERY_BROKER_DB:-1}
      - ETL_COLLECT_INTERVAL_S=${ETL_COLLECT_INTERVAL_S:-300}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build: ./nginx
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "https://127.0.0.1/",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── Supervision / ITSM servers (local instances) ───────────────
  # These are the tools the ETL collectors poll. Each collector activates as
  # soon as its *_API_URL is set in .env (see docs/integrations.md).

  # Zabbix — dedicated PostgreSQL (kept separate from the NOC database so the
  # Zabbix schema never mixes with the dashboard schema).
  zabbix-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${ZABBIX_DB_USER:-zabbix}
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD:-zabbix_db_pass}
      - POSTGRES_DB=${ZABBIX_DB_NAME:-zabbix}
    volumes:
      - zbx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ZABBIX_DB_USER:-zabbix} -d ${ZABBIX_DB_NAME:-zabbix}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_USER=${ZABBIX_DB_USER:-zabbix}
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD:-zabbix_db_pass}
      - POSTGRES_DB=${ZABBIX_DB_NAME:-zabbix}
    ports:
      - "10051:10051" # trapper port — lets Zabbix agents on the LAN report in
    depends_on:
      zabbix-db:
        condition: service_healthy

  # Zabbix UI + JSON-RPC API — http://localhost:8081 (default login Admin/zabbix).
  # The ETL polls http://zabbix-web:8080/api_jsonrpc.php on the compose network.
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_USER=${ZABBIX_DB_USER:-zabbix}
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD:-zabbix_db_pass}
      - POSTGRES_DB=${ZABBIX_DB_NAME:-zabbix}
      - PHP_TZ=${TZ:-Africa/Ouagadougou}
    ports:
      - "8081:8080"
    depends_on:
      zabbix-db:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Agent monitoring the Zabbix server host itself, so the fresh install has at
  # least one live host. In the Zabbix UI, point the "Zabbix server" host's
  # agent interface at DNS name "zabbix-agent" to activate it.
  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    environment:
      - ZBX_HOSTNAME=Zabbix server
      - ZBX_SERVER_HOST=zabbix-server
    depends_on:
      - zabbix-server

  # Nagios Core — UI http://localhost:8083 (login: NAGIOS_USER/NAGIOS_PASSWORD).
  # The ETL polls http://nagios/cgi-bin/statusjson.cgi with Basic auth.
  nagios:
    image: jasonrivers/nagios:latest
    environment:
      - NAGIOSADMIN_USER=${NAGIOS_USER:-nagiosadmin}
      - NAGIOSADMIN_PASS=${NAGIOS_PASSWORD:-nagios}
    ports:
      - "8083:80"
    volumes:
      - nagios_etc:/opt/nagios/etc # host/service definitions survive restarts
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsu $${NAGIOSADMIN_USER}:$${NAGIOSADMIN_PASS} 'http://localhost/cgi-bin/statusjson.cgi?query=programstatus' > /dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # iTop (ITSM / CMDB) — all-in-one image with an embedded MariaDB.
  # UI http://localhost:8082. First start: run the setup wizard with DB server
  # "localhost", login "admin", password $ITOP_DB_PASSWORD — then set
  # ITOP_USER/ITOP_PASS in .env to the iTop admin account you create.
  # The backend calls http://itop/webservices/rest.php once the wizard is done.
  itop:
    image: vbkunin/itop:3.2.2
    environment:
      - MYSQL_PASS=${ITOP_DB_PASSWORD:-itop_db_pass} # embedded MariaDB 'admin' user
    ports:
      - "8082:80"
    volumes:
      - itop_mysql:/var/lib/mysql
      - itop_html:/var/www/html # app + conf + compiled env from the setup wizard
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  reports:
  zbx_pgdata:
  nagios_etc:
  itop_mysql:
  itop_html:
