# version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - CACHE_TTL=${CACHE_TTL}
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - NOC_API_KEY=${NOC_API_KEY}
      - ITOP_URL=${ITOP_URL}
      - ITOP_USER=${ITOP_USER}
      - ITOP_PASS=${ITOP_PASS}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - NOTIFICATIONS_ENABLED=${NOTIFICATIONS_ENABLED:-false}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - NOC_SMS_RECIPIENTS=${NOC_SMS_RECIPIENTS:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noc@anptic.bf}
      - NOC_EMAIL_RECIPIENTS=${NOC_EMAIL_RECIPIENTS:-}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - SYNC_MV_REFRESH=${SYNC_MV_REFRESH:-true}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  etl-worker:
    build: ./etl
    command: celery -A celery_app worker --loglevel=${LOG_LEVEL:-INFO} --concurrency=2
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - NOC_API_URL=http://backend:8000
      - NOC_API_KEY=${NOC_API_KEY}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - CELERY_BROKER_DB=${CELERY_BROKER_DB:-1}
      - REPORTS_DIR=/reports
      # Supervision tool endpoints — a collector runs only when its URL is set
      - ZABBIX_API_URL=${ZABBIX_API_URL:-}
      - ZABBIX_USER=${ZABBIX_USER:-}
      - ZABBIX_PASSWORD=${ZABBIX_PASSWORD:-}
      - ZABBIX_API_TOKEN=${ZABBIX_API_TOKEN:-}
      - NAGIOS_API_URL=${NAGIOS_API_URL:-}
      - NAGIOS_USER=${NAGIOS_USER:-}
      - NAGIOS_PASSWORD=${NAGIOS_PASSWORD:-}
      - NAGIOS_API_KEY=${NAGIOS_API_KEY:-}
      - NETXMS_API_URL=${NETXMS_API_URL:-}
      - NETXMS_USER=${NETXMS_USER:-}
      - NETXMS_PASSWORD=${NETXMS_PASSWORD:-}
      - CENTREON_API_URL=${CENTREON_API_URL:-}
      - CENTREON_USER=${CENTREON_USER:-}
      - CENTREON_PASSWORD=${CENTREON_PASSWORD:-}
      - CENTREON_API_KEY=${CENTREON_API_KEY:-}
    volumes:
      - reports:/reports
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "celery",
          "-A",
          "celery_app",
          "inspect",
          "ping",
          "-d",
          "celery@$$HOSTNAME",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  etl-beat:
    build: ./etl
    command: celery -A celery_app beat --loglevel=${LOG_LEVEL:-INFO}
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - CELERY_BROKER_DB=${CELERY_BROKER_DB:-1}
      - ETL_COLLECT_INTERVAL_S=${ETL_COLLECT_INTERVAL_S:-300}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build: ./nginx
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "https://127.0.0.1/",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  reports:
